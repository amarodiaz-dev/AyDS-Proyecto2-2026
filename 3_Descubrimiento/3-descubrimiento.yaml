openapi: 3.0.3

info:
  title: Descubrimiento y Personalización
  version: 1.0.0
  description: |
    ## Responsabilidad
    Ayudar al usuario a **encontrar contenido relevante**: búsqueda, feeds personalizados,
    recomendaciones, tendencias y ranking.

    El video en este contexto es un **candidato de ranking**: una referencia a un ítem
    del catálogo con puntuación y señales de interés. Este servicio NO duplica la
    metadata editorial completa ni el stream del video.

    ## Integración con otros servicios

    ### Eventos que este servicio consume (asíncronos)
    - `catalogo.contenido_publicado` (Catálogo): indexa el nuevo ítem para búsqueda y feeds.
    - `catalogo.contenido_despublicado` / `catalogo.restriccion_aplicada` (Catálogo): remueve
      o actualiza el ítem del índice.
    - `audiencia.engagement_registrado` (Audiencia): incorpora señales de likes, comentarios
      y suscripciones al modelo de ranking.
    - `sesion_reproduccion.completada` (Publicación): incorpora tiempo de visualización como
      señal de interés del usuario.

    ### Eventos que este servicio emite (asíncronos)
    - `descubrimiento.busqueda_realizada`: para analytics.
    - `descubrimiento.recomendacion_servida`: opcional, para analytics.

    ### Consultas síncronas que este servicio hace a otros
    - Consulta `GET /items/{catalogItemId}/visibilidad` en **Catálogo** para validar
      visibilidad antes de devolver un resultado (especialmente en búsqueda directa).

    ## Consistencia eventual
    Este servicio puede estar momentáneamente desincronizado con Catálogo. Si un contenido
    es despublicado, puede aparecer brevemente en resultados hasta que el evento llegue
    y el índice sea actualizado. Por eso se recomienda que los clientes verifiquen
    visibilidad en Catálogo antes de reproducir.

servers:
  - url: http://localhost:8003
    description: Local Swagger (pruebas)


tags:
  - name: Busqueda
    description: Búsqueda de contenido y canales (RF-D1)
  - name: Feed
    description: Feed personalizado de inicio (RF-D2)
  - name: Relacionado
    description: Contenido relacionado a un ítem (RF-D3)
  - name: Tendencias
    description: Trending y exploración por categoría (RF-D4)
  - name: Senales
    description: Registro de señales de comportamiento del usuario (RF-D5)
  - name: Indexacion
    description: Indexación interna de contenido publicado (RF-D6)

paths:

  # ── RF-D1: Búsqueda ───────────────────────────────────────────────────────

  /busqueda:
    get:
      tags: [Busqueda]
      summary: Buscar contenido por texto libre
      description: |
        Devuelve referencias a ítems de catálogo y/o canales que coincidan con la consulta.
        Los resultados pueden filtrarse y ordenarse. Este servicio no devuelve el stream
        ni la metadata completa; devuelve `catalogItemId` y datos mínimos de presentación.
        **Actor permitido:** viewer autenticado o anónimo.
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Texto de búsqueda libre
        - name: tipo
          in: query
          schema:
            type: string
            enum: [video, canal, todo]
            default: todo
        - name: orden
          in: query
          schema:
            type: string
            enum: [relevancia, fecha, popularidad]
            default: relevancia
        - name: duracionMin
          in: query
          schema:
            type: integer
          description: Duración mínima en segundos
        - name: duracionMax
          in: query
          schema:
            type: integer
        - name: fechaDesde
          in: query
          schema:
            type: string
            format: date
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/pageSize'
      responses:
        '200':
          description: Resultados de búsqueda paginados
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultadosBusqueda'
        '400':
          $ref: '#/components/responses/BadRequest'

  /busqueda/sugerencias:
    get:
      tags: [Busqueda]
      summary: Obtener sugerencias mientras el usuario escribe
      description: |
        Autocompletado en tiempo real basado en el prefijo ingresado.
        **Actor permitido:** viewer autenticado o anónimo.
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Prefijo del texto ingresado
        - name: limite
          in: query
          schema:
            type: integer
            default: 8
            maximum: 15
      responses:
        '200':
          description: Lista de sugerencias
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Sugerencias'

  # ── RF-D2: Feeds personalizados ───────────────────────────────────────────

  /feed:
    get:
      tags: [Feed]
      summary: Obtener feed de inicio personalizado
      description: |
        Devuelve una lista personalizada de referencias a ítems de catálogo,
        ordenada por relevancia para el usuario o sesión actual.
        Incluye una razón interna de por qué se recomienda cada ítem.
        Soporta paginación para carga infinita.
        **Actor permitido:** viewer autenticado o anónimo (feed genérico para anónimos).
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/pageSize'
        - name: region
          in: query
          schema:
            type: string
            example: CL
      responses:
        '200':
          description: Feed personalizado paginado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Feed'

  # ── RF-D3: Contenido relacionado ──────────────────────────────────────────

  /items/{catalogItemId}/relacionados:
    get:
      tags: [Relacionado]
      summary: Obtener videos relacionados a un ítem
      description: |
        Dado un ítem de catálogo, devuelve una lista de referencias a ítems relacionados
        considerando similitud temática, historial del usuario y señales de engagement.
        **Actor permitido:** viewer autenticado o anónimo.
      parameters:
        - $ref: '#/components/parameters/catalogItemId'
        - $ref: '#/components/parameters/pageSize'
      responses:
        '200':
          description: Lista de ítems relacionados
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListaReferencias'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── RF-D4: Tendencias y exploración ──────────────────────────────────────

  /tendencias:
    get:
      tags: [Tendencias]
      summary: Obtener contenido trending
      description: |
        Devuelve los ítems con mayor crecimiento de engagement por región y/o categoría.
        **Actor permitido:** viewer autenticado o anónimo.
      parameters:
        - name: region
          in: query
          schema:
            type: string
            example: CL
        - name: categoria
          in: query
          schema:
            type: string
        - $ref: '#/components/parameters/pageSize'
      responses:
        '200':
          description: Lista de ítems trending
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListaReferencias'

  /categorias:
    get:
      tags: [Tendencias]
      summary: Listar categorías disponibles para exploración
      description: |
        **Actor permitido:** cualquier usuario.
      responses:
        '200':
          description: Lista de categorías
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListaCategorias'

  /categorias/{categoria}/items:
    get:
      tags: [Tendencias]
      summary: Explorar contenido por categoría
      description: |
        Devuelve ítems del catálogo dentro de una categoría, ordenados por popularidad.
        **Actor permitido:** viewer autenticado o anónimo.
      parameters:
        - name: categoria
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/pageSize'
      responses:
        '200':
          description: Ítems de la categoría
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListaReferencias'

  # ── RF-D5: Captura de señales ─────────────────────────────────────────────

  /senales/impresion:
    post:
      tags: [Senales]
      summary: Registrar que un usuario vio un ítem en un feed (impresión)
      description: |
        El cliente reporta que el ítem fue mostrado en pantalla al usuario.
        Esta señal alimenta el perfil de intereses del usuario.
        **Actor permitido:** viewer autenticado o anónimo.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SenalImpresion'
      responses:
        '204':
          description: Señal registrada

  /senales/click:
    post:
      tags: [Senales]
      summary: Registrar que un usuario hizo click en un ítem recomendado
      description: |
        **Actor permitido:** viewer autenticado o anónimo.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SenalClick'
      responses:
        '204':
          description: Señal registrada

  /senales/watch-time:
    post:
      tags: [Senales]
      summary: Registrar tiempo de visualización como señal de interés
      description: |
        Recibido normalmente desde el evento `sesion_reproduccion.completada` de Publicación,
        o enviado directamente por el cliente. Actualiza el perfil de intereses del usuario.
        **Actor permitido:** viewer autenticado, sistema interno.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SenalWatchTime'
      responses:
        '204':
          description: Señal registrada

  # ── RF-D6: Indexación (uso interno) ──────────────────────────────────────

  /indice/items:
    post:
      tags: [Indexacion]
      summary: Indexar un ítem recién publicado en Catálogo
      description: |
        Endpoint interno llamado cuando se recibe el evento `catalogo.contenido_publicado`.
        Agrega el ítem al índice de búsqueda y feeds.
        **Actor permitido:** sistema interno.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IndexarItemRequest'
      responses:
        '204':
          description: Ítem indexado

  /indice/items/{catalogItemId}:
    put:
      tags: [Indexacion]
      summary: Actualizar un ítem en el índice
      description: |
        Se llama cuando `catalogo.contenido_publicado` llega con datos actualizados.
        **Actor permitido:** sistema interno.
      parameters:
        - $ref: '#/components/parameters/catalogItemId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IndexarItemRequest'
      responses:
        '204':
          description: Índice actualizado

    delete:
      tags: [Indexacion]
      summary: Remover un ítem del índice
      description: |
        Se llama cuando se recibe `catalogo.contenido_despublicado` o
        `catalogo.restriccion_aplicada`. El ítem deja de aparecer en búsquedas y feeds.
        **Actor permitido:** sistema interno.
      parameters:
        - $ref: '#/components/parameters/catalogItemId'
      responses:
        '204':
          description: Ítem removido del índice

# ── Componentes ──────────────────────────────────────────────────────────────

components:

  parameters:
    catalogItemId:
      name: catalogItemId
      in: path
      required: true
      schema:
        type: string
    page:
      name: page
      in: query
      schema:
        type: integer
        default: 1
    pageSize:
      name: pageSize
      in: query
      schema:
        type: integer
        default: 20
        maximum: 50

  responses:
    BadRequest:
      description: Solicitud inválida
    NotFound:
      description: Recurso no encontrado

  schemas:


    ReferenciaItem:
      type: object
      description: |
        Referencia mínima a un ítem de catálogo. Este servicio no duplica la metadata
        completa; el cliente debe consultar Catálogo para obtener todos los datos editoriales.
      properties:
        catalogItemId:
          type: string
        channelId:
          type: string
        titulo:
          type: string
          description: Título resumido para presentación en resultados.
        urlMiniatura:
          type: string
          format: uri
        duracionSegundos:
          type: integer
          description: Dato técnico obtenido de Publicación al momento de indexar.
        categoria:
          type: string
        puntuacionRanking:
          type: number
          format: float
        razonRecomendacion:
          type: string
          nullable: true
          description: Razón legible de por qué se recomienda este ítem.
      example:
        catalogItemId: cat_item_001
        channelId: ch_001
        titulo: "Introducción a Docker en 10 minutos"
        urlMiniatura: https://thumb.youtube-interno.com/cat_item_001.jpg
        duracionSegundos: 312
        categoria: tecnologia
        puntuacionRanking: 0.87
        razonRecomendacion: "Porque viste videos de DevOps"

    ReferenciaCanal:
      type: object
      properties:
        channelId:
          type: string
        nombre:
          type: string
        urlImagen:
          type: string
          format: uri

    ResultadosBusqueda:
      type: object
      properties:
        query:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/ReferenciaItem'
        canales:
          type: array
          items:
            $ref: '#/components/schemas/ReferenciaCanal'
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer

    Sugerencias:
      type: object
      properties:
        query:
          type: string
        sugerencias:
          type: array
          items:
            type: string
      example:
        query: "docker"
        sugerencias:
          - "docker tutorial"
          - "docker compose"
          - "docker kubernetes"
          - "docker para principiantes"

    Feed:
      type: object
      properties:
        userId:
          type: string
          nullable: true
        items:
          type: array
          items:
            $ref: '#/components/schemas/ReferenciaItem'
        page:
          type: integer
        pageSize:
          type: integer

    ListaReferencias:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ReferenciaItem'
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer

    ListaCategorias:
      type: object
      properties:
        categorias:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              nombre:
                type: string

    SenalImpresion:
      type: object
      required: [catalogItemId]
      properties:
        catalogItemId:
          type: string
        userId:
          type: string
          nullable: true
        fuente:
          type: string
          enum: [feed_inicio, busqueda, tendencias, relacionados]
        timestampMs:
          type: integer
          format: int64

    SenalClick:
      type: object
      required: [catalogItemId]
      properties:
        catalogItemId:
          type: string
        userId:
          type: string
          nullable: true
        fuente:
          type: string
          enum: [feed_inicio, busqueda, tendencias, relacionados]
        timestampMs:
          type: integer
          format: int64

    SenalWatchTime:
      type: object
      required: [catalogItemId, segundosVistos]
      properties:
        catalogItemId:
          type: string
        userId:
          type: string
          nullable: true
        segundosVistos:
          type: number
        porcentajeVisto:
          type: number
          format: float

    IndexarItemRequest:
      type: object
      required: [catalogItemId, channelId, titulo, categoria]
      properties:
        catalogItemId:
          type: string
        channelId:
          type: string
        titulo:
          type: string
        descripcion:
          type: string
        tags:
          type: array
          items:
            type: string
        categoria:
          type: string
        urlMiniatura:
          type: string
          format: uri
        duracionSegundos:
          type: integer
        publicadoEn:
          type: string
          format: date-time
